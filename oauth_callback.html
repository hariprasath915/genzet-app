<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signing in — Genzet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #050B18;
      --navy-card:  #0D1B35;
      --violet:     #6B4FFF;
      --cyan:       #00D4FF;
      --white:      #F0F4FF;
      --white-dim:  rgba(240, 244, 255, 0.6);
      --gradient:   linear-gradient(135deg, #6B4FFF 0%, #00D4FF 100%);
      --font-body:  'Inter', sans-serif;
      --font-mono:  'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--white);
      font-family: var(--font-body);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient glows */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: -10%;
      width: 55%;
      height: 55%;
      background: radial-gradient(circle, rgba(107, 79, 255, .25) 0%, transparent 65%);
      pointer-events: none;
      animation: drift1 10s ease-in-out infinite;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -10%;
      right: -5%;
      width: 50%;
      height: 50%;
      background: radial-gradient(circle, rgba(0, 212, 255, .15) 0%, transparent 65%);
      pointer-events: none;
      animation: drift2 13s ease-in-out infinite;
    }
    @keyframes drift1 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(30px, -20px); } }
    @keyframes drift2 { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(-20px, 15px); } }

    /* Card */
    .card {
      background: rgba(13, 27, 53, 0.92);
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 24px;
      padding: 48px 44px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0, 0, 0, .55), 0 0 0 1px rgba(107, 79, 255, .1);
      position: relative;
      z-index: 1;
      animation: popIn .35s cubic-bezier(.34, 1.56, .64, 1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: translateY(20px) scale(.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Brand */
    .brand {
      font-family: 'Inter', sans-serif;
      font-weight: 800;
      font-size: 1.5rem;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
      letter-spacing: -.02em;
    }

    /* Spinner ring */
    .spinner-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(107,79,255,.2), rgba(0,212,255,.1));
      border: 1px solid rgba(107, 79, 255, .3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
    }
    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, .15);
      border-top-color: var(--violet);
      border-right-color: var(--cyan);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status text */
    #status-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: .5rem;
    }
    #status-msg {
      font-size: .82rem;
      color: var(--white-dim);
      font-family: var(--font-mono);
      letter-spacing: .03em;
      line-height: 1.6;
    }

    /* Error state */
    .card.error .spinner-wrap {
      background: rgba(255, 80, 80, .1);
      border-color: rgba(255, 80, 80, .3);
    }
    .card.error .spinner { display: none; }
    .err-icon {
      display: none;
      font-size: 1.4rem;
    }
    .card.error .err-icon { display: block; }
    .card.error #status-title { color: rgba(255, 140, 140, .95); }

    /* Success state */
    .card.success .spinner-wrap {
      background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(16,185,129,.15));
      border-color: rgba(16, 185, 129, .3);
    }
    .card.success .spinner { display: none; }
    .ok-icon { display: none; font-size: 1.4rem; }
    .card.success .ok-icon { display: block; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="brand">Genzet</div>

    <div class="spinner-wrap">
      <div class="spinner"></div>
      <span class="err-icon">✕</span>
      <span class="ok-icon">✓</span>
    </div>

    <div id="status-title">Completing sign-in…</div>
    <div id="status-msg">Verifying your Google account</div>
  </div>

  <script>
    /* ─── OAuth Callback Handler ───────────────────────────────────────
       Supabase redirects here after Google OAuth with tokens in the URL
       fragment (#access_token=...&refresh_token=...&token_type=bearer)
       We read them, post to the opener (main app window), then close.
    ────────────────────────────────────────────────────────────────── */
    (function () {
      var card      = document.getElementById('card');
      var titleEl   = document.getElementById('status-title');
      var msgEl     = document.getElementById('status-msg');

      function setError(msg) {
        card.classList.add('error');
        titleEl.textContent = 'Sign-in failed';
        msgEl.textContent   = msg || 'Something went wrong. Please close this window and try again.';
      }

      function setSuccess() {
        card.classList.add('success');
        titleEl.textContent = 'Signed in!';
        msgEl.textContent   = 'Returning to Genzet…';
      }

      // Parse URL fragment (Supabase implicit flow)
      var hash   = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);

      // Also check query string (error cases, or PKCE code)
      var qp    = new URLSearchParams(window.location.search);
      var error = params.get('error') || qp.get('error');
      var errorDesc = params.get('error_description') || qp.get('error_description') || error;

      var accessToken  = params.get('access_token');
      var refreshToken = params.get('refresh_token') || '';

      // No opener means this page was opened directly — show guidance
      if (!window.opener) {
        setError('This page should not be opened directly. Close this tab and sign in again from Genzet.');
        return;
      }

      if (error || !accessToken) {
        var errMsg = (errorDesc || 'Google sign-in was cancelled or failed.').replace(/\+/g, ' ');
        window.opener.postMessage({ type: 'GENZET_OAUTH_ERROR', error: errMsg }, '*');
        setError(errMsg);
        setTimeout(function () { window.close(); }, 2000);
        return;
      }

      // Success — post tokens to opener and close
      setSuccess();
      window.opener.postMessage({
        type:          'GENZET_OAUTH_SUCCESS',
        access_token:  accessToken,
        refresh_token: refreshToken,
      }, '*');

      // Give a brief moment for the success state to render before closing
      setTimeout(function () { window.close(); }, 600);
    })();
  </script>
</body>
</html>
