services:
  - type: web
    name: animind-backend
    runtime: python
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # ── REQUIRED — Set these in Render Dashboard → Environment ───────
      # ANTHROPIC_API_KEY  — your sk-ant-... key  (required for AI features)
      # JWT_SECRET_KEY     — long random string    (required for auth)
      #
      # ── DATABASE (choose one) ───────────────────────────────────────────
      # DATABASE_URL       — leave UNSET to use SQLite (⚠ ephemeral on free tier!)
      #                      OR set to a PostgreSQL URL (Neon/Supabase — recommended)
      #
      # ── OPTIONAL ────────────────────────────────────────────────────────
      # DEBUG_CORS         — set to "true" while debugging, then remove
      # KEEP_ALIVE_INTERVAL — self-ping interval in seconds (default: 600 = 10 min)
      - key: JWT_EXPIRE_DAYS
        value: "900"