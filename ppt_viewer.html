<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPT Viewer — GenZET</title>
  <meta name="description" content="GenZET PowerPoint Presentation Viewer — slides rendered with full fidelity." />
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <!-- PPTXjs CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@latest/css/pptxjs.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@latest/css/nv.d3.min.css">
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --text2: #94a3b8;
      --text3: #64748b;
      --teal: #14b8a6;
      --teal-lt: rgba(20,184,166,.12);
      --green: #10b981;
      --green-lt: rgba(16,185,129,.12);
    }

    body {
      font-family: 'Sora', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      flex-shrink: 0;
      gap: 16px;
      flex-wrap: wrap;
      min-height: 56px;
      z-index: 1000;
      position: relative;
    }

    #topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-logo {
      font-size: 15px;
      font-weight: 800;
      background: linear-gradient(135deg, #14b8a6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .topbar-sep {
      width: 1.5px;
      height: 20px;
      background: var(--border);
      border-radius: 2px;
    }

    #pptTitle {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 320px;
    }

    #pptSub {
      font-size: 11px;
      color: var(--text3);
      margin-top: 1px;
    }

    #topbar-center {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .act-btn {
      padding: 7px 14px;
      border-radius: 9px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Sora', sans-serif;
      transition: all .2s;
      white-space: nowrap;
    }

    .act-btn:hover {
      border-color: var(--teal);
      color: var(--teal);
      background: var(--teal-lt);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .5px;
      text-transform: uppercase;
      background: var(--green-lt);
      color: var(--green);
      border: 1px solid rgba(16,185,129,.3);
    }

    /* ── SLIDE AREA ── */
    #slideArea {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 20px;
      background: radial-gradient(ellipse at center, #1a2744 0%, #0f172a 100%);
      position: relative;
    }

    /* Loading & Error states */
    #loadingState {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text2);
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #loadingMsg {
      font-size: 14px;
      font-weight: 600;
    }

    #errorState {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #f87171;
      text-align: center;
      padding: 20px;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    #errorIcon {
      font-size: 48px;
    }

    #errorMsg {
      font-size: 14px;
      font-weight: 600;
      max-width: 400px;
    }

    /* PPTX container wrapper */
    #pptx-wrapper {
      width: 100%;
      height: 100%;
      display: none; /* hidden until loaded */
      overflow: auto; /* Allow scrolling if zoomed */
    }

    #pptx-container {
      margin: 0 auto;
    }

    /* Override PPTXjs default styles slightly to fit the dark theme */
    .pptx-wrapper {
      background-color: transparent !important;
      padding: 0 !important;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div id="topbar">
    <div id="topbar-left">
      <span class="topbar-logo">GenZET</span>
      <div class="topbar-sep"></div>
      <div>
        <div id="pptTitle">PowerPoint Viewer</div>
        <div id="pptSub">Loading…</div>
      </div>
    </div>

    <div id="topbar-right">
      <span class="badge">📊 PPT Viewer</span>
      <button class="act-btn" onclick="toggleFullscreen()" id="btnFullscreen">⛶ Fullscreen</button>
    </div>
  </div>

  <!-- SLIDE AREA -->
  <div id="slideArea">
    <div id="loadingState">
      <div class="spinner"></div>
      <div id="loadingMsg">Loading your presentation…</div>
    </div>
    <div id="errorState">
      <div id="errorIcon">⚠️</div>
      <div id="errorMsg">Could not load the presentation.</div>
    </div>
    
    <div id="pptx-wrapper">
      <div id="pptx-container"></div>
    </div>
  </div>

  <!-- Dependencies for PPTXjs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/2.6.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/filereader/0.25.0/filereader.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/4.13.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nvd3/1.8.6/nv.d3.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@latest/js/pptxjs.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/meshesha/PPTXjs@latest/js/divs2slides.js"></script>

  <script>
    // ═══════════════════════════════════════════════
    // GenZET PPT Viewer (using PPTXjs for full fidelity)
    // ═══════════════════════════════════════════════

    // ── Fetch PPTX from IndexedDB ──────────────────
    function loadFromDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open('GenzET_PPT', 1);
        req.onupgradeneeded = e => e.target.result.createObjectStore('slides');
        req.onsuccess = e => {
          const db = e.target.result;
          const tx = db.transaction('slides', 'readonly');
          const getReq = tx.objectStore('slides').get('__gz_ppt_pending__');
          getReq.onsuccess = () => { db.close(); resolve(getReq.result || null); };
          getReq.onerror = () => { db.close(); reject(getReq.error); };
        };
        req.onerror = () => reject(req.error);
      });
    }

    function showError(msg) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('errorState').style.display = 'flex';
      document.getElementById('errorMsg').textContent = msg;
    }

    // ── Fullscreen ─────────────────────────────────
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
        document.getElementById('btnFullscreen').textContent = '⛶ Exit Fullscreen';
      } else {
        document.exitFullscreen();
        document.getElementById('btnFullscreen').textContent = '⛶ Fullscreen';
      }
    }
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.getElementById('btnFullscreen').textContent = '⛶ Fullscreen';
      }
    });

    // ── Main init ──────────────────────────────────
    async function init() {
      // Load title/sub from localStorage
      const name = localStorage.getItem('gz_ppt_pending_name') || 'Presentation';
      const sub  = localStorage.getItem('gz_ppt_pending_sub')  || '';
      document.getElementById('pptTitle').textContent = name;
      document.getElementById('pptSub').textContent   = sub;
      document.title = name + ' — GenZET PPT Viewer';

      document.getElementById('loadingMsg').textContent = 'Loading "' + name + '"…';

      try {
        const pptxData = await loadFromDB(); // ArrayBuffer
        if (!pptxData) throw new Error('No presentation data found. Please go back and click Present again.');

        // Convert ArrayBuffer to Blob, then to Object URL
        const blob = new Blob([pptxData], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
        const url = URL.createObjectURL(blob);

        document.getElementById('loadingMsg').textContent = 'Rendering slides with full fidelity…';

        // Initialize PPTXjs
        $("#pptx-container").pptxToHtml({
          pptxFileUrl: url,
          slideMode: true,
          keyBoardShortCut: true,
          mediaProcess: true,
          jsZipV2: true,
          slideModeConfig: {
            first: 1, 
            nav: true, 
            navTitle: true,
            showPlayPauseBtn: true,
            keyBoardShortCut: true,
            showSlideNum: true,
            showTotalSlideNum: true,
            autoSlide: false,
            randomAutoSlide: false, 
            loop: false,
            background: 'transparent',
            transition: 'default',
            navigationSkip: false
          }
        });

        // Hide loading once loaded (PPTXjs emits an event or we can just delay)
        // pptxToHtml doesn't return a strict promise, but we can hook into its completion if needed,
        // or just wait a moment. It typically creates .slide elements.
        const checkReady = setInterval(() => {
          if ($('.slide').length > 0) {
            clearInterval(checkReady);
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('pptx-wrapper').style.display = 'block';
          }
        }, 300);

        // Timeout fallback
        setTimeout(() => {
          clearInterval(checkReady);
          document.getElementById('loadingState').style.display = 'none';
          document.getElementById('pptx-wrapper').style.display = 'block';
        }, 5000);

      } catch (err) {
        console.error('[PPT Viewer]', err);
        showError(err.message || 'Failed to load the presentation. Please try again.');
      }
    }

    $(document).ready(function() {
      init();
    });
  </script>
</body>
</html>
