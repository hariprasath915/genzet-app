<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PPT Viewer — GenZET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0f172a;--surface:#1e293b;--border:#334155;
      --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
      --teal:#14b8a6;--teal-lt:rgba(20,184,166,.12);
      --green:#10b981;--green-lt:rgba(16,185,129,.12);
    }
    body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
    #topbar{display:flex;align-items:center;justify-content:space-between;padding:8px 18px;background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0;gap:12px;min-height:52px;z-index:100}
    .tb-logo{font-size:14px;font-weight:800;background:linear-gradient(135deg,#14b8a6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .tb-sep{width:1.5px;height:18px;background:var(--border);border-radius:2px;flex-shrink:0}
    #pptTitle{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
    #pptSub{font-size:10px;color:var(--text3)}
    .nav-btn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:inherit}
    .nav-btn:hover:not(:disabled){border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
    .nav-btn:disabled{opacity:.3;cursor:not-allowed}
    #slideCounter{font-size:12px;font-weight:700;color:var(--text2);min-width:60px;text-align:center}
    .badge{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;background:var(--green-lt);color:var(--green);border:1px solid rgba(16,185,129,.3)}
    .act-btn{padding:6px 12px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .18s;white-space:nowrap}
    .act-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
    #progressBar{height:2px;background:var(--border);flex-shrink:0}
    #progressFill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));transition:width .3s ease;border-radius:0 2px 2px 0}
    #stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(ellipse at center,#1a2744 0%,#0f172a 100%);position:relative;padding:16px}
    #loadingState{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--text2)}
    .spinner{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loadingMsg{font-size:13px;font-weight:600}
    #errorBox{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;flex-direction:column;align-items:center;gap:12px;color:#f87171;text-align:center;padding:24px;background:rgba(30,41,59,.9);border:1.5px solid #7f1d1d;border-radius:14px;max-width:400px}
    #errorBox p{font-size:13px;font-weight:600}
    #thumbBar{display:flex;align-items:center;gap:5px;padding:8px 18px;background:var(--surface);border-top:1.5px solid var(--border);flex-shrink:0;min-height:46px;overflow-x:auto}
    .thumb-btn{width:44px;height:28px;border-radius:4px;border:2px solid var(--border);background:#1a2744;cursor:pointer;flex-shrink:0;font-size:9px;font-weight:800;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:all .14s;font-family:inherit}
    .thumb-btn.active{border-color:var(--teal);color:var(--teal);background:var(--teal-lt)}
    .thumb-btn:hover:not(.active){border-color:var(--text3);color:var(--text2)}
    #kbHint{position:fixed;bottom:56px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.92);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:10px;color:var(--text3);pointer-events:none;opacity:0;transition:opacity .4s;white-space:nowrap;z-index:999}
    #kbHint.show{opacity:1}
    /* The rendered slide */
    .gz-slide{position:relative;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.65),0 0 0 1px rgba(255,255,255,.08);border-radius:4px;flex-shrink:0}
    .gz-shape{position:absolute;overflow:hidden;box-sizing:border-box}
    .gz-text-layer{position:absolute;inset:0;display:flex;flex-direction:column;box-sizing:border-box}
    .gz-para{box-sizing:border-box;line-height:1.25}
    .gz-run{display:inline;white-space:pre-wrap}
  </style>
</head>
<body>
<div id="topbar">
  <div style="display:flex;align-items:center;gap:10px">
    <span class="tb-logo">GenZET</span>
    <div class="tb-sep"></div>
    <div><div id="pptTitle">PPT Viewer</div><div id="pptSub">Loading…</div></div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
    <button class="nav-btn" id="btnPrev" onclick="prevSlide()" disabled>‹</button>
    <span id="slideCounter">— / —</span>
    <button class="nav-btn" id="btnNext" onclick="nextSlide()" disabled>›</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="badge">📊 PPT Viewer</span>
    <button class="act-btn" id="btnFS" onclick="toggleFS()">⛶ Fullscreen</button>
  </div>
</div>
<div id="progressBar"><div id="progressFill" style="width:0%"></div></div>
<div id="stage">
  <div id="loadingState"><div class="spinner"></div><div id="loadingMsg">Loading…</div></div>
  <div id="errorBox"><span style="font-size:40px">⚠️</span><p id="errorMsg">Error loading presentation.</p></div>
  <div id="slideHost"></div>
</div>
<div id="thumbBar"></div>
<div id="kbHint">← → to navigate · Space = next · F = fullscreen</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════════════════════
//  GenZET PPTX Viewer  v3  — full property-inheritance renderer
//  Key fixes: colour/size inheritance chain, slide-master defaults,
//             proper scheme-colour resolution, blip image paths
// ═══════════════════════════════════════════════════════════════════════════════

/* ── Conversions ──────────────────────────────────────────────────── */
const EMU_PX = v => (v / 914400) * 96;   // EMU → px  @96dpi
const EMU_PT = v => v / 12700;           // EMU → pt

/* ── Globals ──────────────────────────────────────────────────────── */
let zip           = null;
let slideW_emu    = 9144000;
let slideH_emu    = 5143500;
let themeColors   = {};          // scheme name → #hex
let themeFonts    = { major: 'Calibri', minor: 'Calibri' };
// master default run properties per placeholder type
let masterTxStyles = { title: null, body: null, other: null };  // defRPr element
let slideFiles    = [];
let currentIdx    = 0;
let renderCache   = {};          // idx→scale+html

/* ── XML shortcuts ────────────────────────────────────────────────── */
const parseXml = s => new DOMParser().parseFromString(s, 'application/xml');
const xq  = (el, tag) => el?.getElementsByTagNameNS('*', tag)?.[0] ?? null;
const xqa = (el, tag) => el ? [...el.getElementsByTagNameNS('*', tag)] : [];

/* ────────────────────────────────────────────────────────────────────
   COLOUR RESOLUTION
   Priority: explicit srgbClr → sysClr → schemeClr (via themeColors) → prstClr
──────────────────────────────────────────────────────────────────── */
function resolveColorEl(el) {
  if (!el) return null;
  let hex = null;
  const srgb = xq(el, 'srgbClr');
  if (srgb) hex = srgb.getAttribute('val');
  const sys  = xq(el, 'sysClr');
  if (sys)  hex = sys.getAttribute('lastClr') || sys.getAttribute('val');
  const sch  = xq(el, 'schemeClr');
  if (sch) {
    const name = sch.getAttribute('val');
    hex = (themeColors[name] || '#000000').replace('#','');
    hex = applyMods(hex, sch);
    return '#' + hex;
  }
  const prst = xq(el, 'prstClr');
  if (prst) { const p = PRST[prst.getAttribute('val')]; hex = p || '000000'; }
  if (!hex) return null;
  hex = hex.replace('#','');
  if (srgb) hex = applyMods(hex, srgb);
  if (sys)  hex = applyMods(hex, sys);
  return '#' + hex;
}

function applyMods(hex6, el) {
  let [r,g,b] = hex2rgb(hex6);
  const gv  = n => { const e=xq(el,n); return e?parseInt(e.getAttribute('val')):null; };
  const lm  = gv('lumMod');   if (lm)  { const f=lm/100000; r=cl(r*f);g=cl(g*f);b=cl(b*f); }
  const lo  = gv('lumOff');   if (lo)  { const o=lo/100000*255; r=cl(r+o);g=cl(g+o);b=cl(b+o); }
  const sh  = gv('shade');    if (sh)  { const s=sh/100000; r=cl(r*s);g=cl(g*s);b=cl(b*s); }
  const ti  = gv('tint');     if (ti)  { const t=ti/100000; r=cl(r+(255-r)*t);g=cl(g+(255-g)*t);b=cl(b+(255-b)*t); }
  const sm  = gv('satMod');   if (sm) { /* approximate */ }
  return rgb2hex(r,g,b);
}
function hex2rgb(h){ h=h.replace('#',''); return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function rgb2hex(r,g,b){ return [r,g,b].map(v=>cl(v).toString(16).padStart(2,'0')).join(''); }
function cl(v){return Math.max(0,Math.min(255,Math.round(v)));}

const PRST = {black:'000000',white:'ffffff',red:'ff0000',green:'008000',blue:'0000ff',
  yellow:'ffff00',cyan:'00ffff',magenta:'ff00ff',orange:'ffa500',purple:'800080',
  gray:'808080',grey:'808080',brown:'a52a2a',pink:'ffc0cb',navy:'000080',
  lime:'00ff00',silver:'c0c0c0',gold:'ffd700',indigo:'4b0082',violet:'ee82ee',
  aqua:'00ffff',fuchsia:'ff00ff',maroon:'800000',olive:'808000',teal:'008080'};

/* ── Fill → CSS ───────────────────────────────────────────────────── */
function fillCSS(el) {
  if (!el) return '';
  if (xq(el,'noFill')) return 'background:transparent;';
  const solid = xq(el,'solidFill');
  if (solid) { const c=resolveColorEl(solid); return c?`background:${c};`:''; }
  const grad = xq(el,'gradFill');
  if (grad) {
    const stops = xqa(grad,'gs').map(gs=>{
      const p=parseInt(gs.getAttribute('pos'))/1000;
      return `${resolveColorEl(gs)||'#000'} ${p}%`;
    });
    const lin = xq(grad,'lin');
    const ang = lin?parseInt(lin.getAttribute('ang')||'0')/60000:90;
    return stops.length?`background:linear-gradient(${ang}deg,${stops.join(',')});`:'';
  }
  const patt = xq(el,'pattFill');
  if (patt) { const c=resolveColorEl(xq(patt,'fgClr')); return c?`background:${c};`:''; }
  return '';
}

/* ── Image helper ─────────────────────────────────────────────────── */
const imgCache = {};
async function blipSrc(rId, relMap) {
  if (!rId||!relMap[rId]) return null;
  const key = relMap[rId];
  if (imgCache[key]) return imgCache[key];
  // Resolve path: targets are relative to ppt/slides/ i.e. ../media/...
  let path = key.replace(/\\/g,'/');
  if (!path.startsWith('ppt/')) path = 'ppt/slides/' + path;
  // normalise ..
  const parts = path.split('/');
  const norm = [];
  for (const p of parts) { if (p==='..') norm.pop(); else if (p!=='.') norm.push(p); }
  path = norm.join('/');
  const file = zip.file(path);
  if (!file) return null;
  const ext = path.split('.').pop().toLowerCase();
  const mime = {png:'image/png',jpg:'image/jpeg',jpeg:'image/jpeg',gif:'image/gif',
                bmp:'image/bmp',svg:'image/svg+xml',tif:'image/tiff',tiff:'image/tiff',
                emf:'image/x-emf',wmf:'image/x-wmf'}[ext]||'image/png';
  const b64  = await file.async('base64');
  const src  = `data:${mime};base64,${b64}`;
  imgCache[key] = src;
  return src;
}

/* ── Parse rels ───────────────────────────────────────────────────── */
async function parseRels(relPath) {
  const map = {};
  const f   = zip.file(relPath);
  if (!f) return map;
  const doc = parseXml(await f.async('text'));
  for (const r of xqa(doc,'Relationship'))
    map[r.getAttribute('Id')] = r.getAttribute('Target');
  return map;
}

/* ────────────────────────────────────────────────────────────────────
   PROPERTY INHERITANCE — extract a merged "defRPr" object
   from a chain of XML elements (each can supply sz, color, font, b, i)
──────────────────────────────────────────────────────────────────── */
function extractRProp(rPrEl) {
  if (!rPrEl) return {};
  const sz = rPrEl.getAttribute('sz');
  const b  = rPrEl.getAttribute('b');
  const i  = rPrEl.getAttribute('i');
  const u  = rPrEl.getAttribute('u');
  const strike = rPrEl.getAttribute('strike');
  const latin  = xq(rPrEl,'latin');
  const sf     = xq(rPrEl,'solidFill');
  const color  = resolveColorEl(sf);
  const rawFont= latin?.getAttribute('typeface')||null;
  const font   = rawFont==='+mj-lt' ? themeFonts.major
               : rawFont==='+mn-lt' ? themeFonts.minor
               : rawFont;
  return { sz:sz?parseInt(sz)/100:null, b:b==='1'?true:b==='0'?false:null,
           i:i==='1'?true:i==='0'?false:null, u:u&&u!=='none'?true:false,
           strike: strike==='sngStrike'||strike==='dblStrike', color, font };
}

function mergeRProps(...sources) {
  // sources = [run rPr, para defRPr, shape lstStyle defRPr, master defRPr]
  // first non-null wins for each property
  const merged = { sz:18, b:false, i:false, u:false, strike:false, color:null, font:null };
  for (const src of [...sources].reverse()) {
    if (!src) continue;
    if (src.sz    != null) merged.sz    = src.sz;
    if (src.b     != null) merged.b     = src.b;
    if (src.i     != null) merged.i     = src.i;
    if (src.u     != null) merged.u     = src.u;
    if (src.strike!= null) merged.strike= src.strike;
    if (src.color != null) merged.color = src.color;
    if (src.font  != null) merged.font  = src.font;
  }
  return merged;
}

/* ── Paragraph alignment ──────────────────────────────────────────── */
const ALGN = {l:'left',ctr:'center',r:'right',just:'justify',dist:'justify'};

/* ────────────────────────────────────────────────────────────────────
   RENDER ONE PARAGRAPH → HTML string
   paraDefRProp = merged props from defRPr at para level
   shapeDefRProp = merged props from shape lstStyle
   masterDefRProp = from slide master
──────────────────────────────────────────────────────────────────── */
function renderPara(pEl, paraDefRProp, shapeDefRProp, masterDefRProp, scale) {
  const pPr   = xq(pEl,'pPr');
  const algn  = pPr?.getAttribute('algn') || 'l';
  const align = ALGN[algn] || 'left';
  const marL  = pPr ? EMU_PT(parseInt(pPr.getAttribute('marL')||'0')) : 0;
  const ind   = pPr ? EMU_PT(parseInt(pPr.getAttribute('indent')||'0')) : 0;
  const spcBefEl = xq(pPr,'spcBef');
  const spcBef= spcBefEl ? parseInt(xq(spcBefEl,'spcPts')?.getAttribute('val')||'0')/100 : 0;

  // defRPr on this paragraph
  const pDefRPr   = xq(pPr,'defRPr');
  const pDefProps = extractRProp(pDefRPr);

  const runs = xqa(pEl,'r');
  const flds = xqa(pEl,'fld');
  // Sort all inline elements in document order
  const allInline = [...runs,...flds].sort((a,b)=>{
    const ord = el => { let i=0; let n=el; while((n=n.previousSibling)) i++; return i; };
    return ord(a)-ord(b);
  });

  let spansHtml = '';
  for (const r of allInline) {
    const rPrEl = xq(r,'rPr');
    const tEl   = xq(r,'t');
    const text  = tEl?.textContent ?? '';
    // INHERITANCE CHAIN: run → para defRPr → shape defRPr → master defRPr
    const props = mergeRProps(
      masterDefRProp,
      shapeDefRProp,
      pDefProps,
      extractRProp(rPrEl)
    );
    const sz    = (props.sz || 18) * scale;
    const color = props.color || themeColors['dk1'] || '#000000';
    const font  = props.font  || themeFonts.minor || 'Calibri';
    const deco  = [props.u?'underline':'', props.strike?'line-through':''].filter(Boolean).join(' ') || 'none';
    const css   = [
      `font-size:${sz}pt`,
      `color:${color}`,
      `font-family:"${font}",Calibri,Arial,sans-serif`,
      `font-weight:${props.b?'bold':'normal'}`,
      `font-style:${props.i?'italic':'normal'}`,
      `text-decoration:${deco}`,
    ].join(';');
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    spansHtml += `<span class="gz-run" style="${css}">${safe}</span>`;
  }

  if (!spansHtml && runs.length === 0) {
    // empty paragraph = line break
    return `<div class="gz-para" style="text-align:${align};margin-left:${marL}pt;text-indent:${ind}pt;margin-top:${spcBef}pt;min-height:${18*scale}pt;">&nbsp;</div>`;
  }

  return `<div class="gz-para" style="text-align:${align};margin-left:${marL}pt;text-indent:${ind}pt;margin-top:${spcBef}pt;">${spansHtml}</div>`;
}

/* ────────────────────────────────────────────────────────────────────
   RENDER ONE SHAPE (sp, pic, grpSp, graphicFrame)
──────────────────────────────────────────────────────────────────── */
async function renderElement(el, relMap, scale) {
  const ln = el.localName;
  if (ln === 'sp')           return await renderSp(el, relMap, scale);
  if (ln === 'pic')          return await renderPic(el, relMap, scale);
  if (ln === 'grpSp')        return await renderGrp(el, relMap, scale);
  if (ln === 'graphicFrame') return await renderGraphicFrame(el, relMap, scale);
  return '';
}

/* ── Get xfrm data ────────────────────────────────────────────────── */
function getXfrm(el, scale) {
  const xfrm = xq(el,'xfrm');
  if (!xfrm) return null;
  const off = xq(xfrm,'off');
  const ext = xq(xfrm,'ext');
  if (!off||!ext) return null;
  return {
    x:   EMU_PX(parseInt(off.getAttribute('x')||'0')) * scale,
    y:   EMU_PX(parseInt(off.getAttribute('y')||'0')) * scale,
    w:   EMU_PX(parseInt(ext.getAttribute('cx')||'0')) * scale,
    h:   EMU_PX(parseInt(ext.getAttribute('cy')||'0')) * scale,
    rot: parseFloat(xfrm.getAttribute('rot')||'0') / 60000,
    flipH: xfrm.getAttribute('flipH') === '1',
    flipV: xfrm.getAttribute('flipV') === '1',
  };
}

/* ── sp ───────────────────────────────────────────────────────────── */
async function renderSp(sp, relMap, scale) {
  const fr = getXfrm(sp, scale);
  if (!fr) return '';
  const spPr  = xq(sp,'spPr');
  const txBody= xq(sp,'txBody');
  const nvSpPr= xq(sp,'nvSpPr');
  const ph    = nvSpPr ? xq(nvSpPr,'ph') : null;
  const phType= ph?.getAttribute('type') || null;

  /* ── shape fill ── */
  let bgStyle = fillCSS(spPr) || 'background:transparent;';

  /* ── blip fill inside spPr ── */
  const blipFill = xq(spPr,'blipFill');
  if (blipFill) {
    const blip = xq(blipFill,'blip');
    const rId  = blip?.getAttribute('r:embed') ||
      blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed');
    const src  = await blipSrc(rId, relMap);
    if (src) bgStyle = `background:url('${src}') center/cover no-repeat;`;
  }

  /* ── border ── */
  const ln2  = xq(spPr,'ln');
  let bdrCSS = '';
  if (ln2 && !xq(ln2,'noFill')) {
    const wEmu = parseInt(ln2.getAttribute('w')||'0');
    const wPx  = Math.max(0.5, EMU_PX(wEmu) * scale);
    const lnC  = resolveColorEl(xq(ln2,'solidFill'));
    if (lnC && wEmu > 0) bdrCSS = `border:${wPx}px solid ${lnC};`;
  }

  /* ── geometry ── */
  const geom = xq(spPr,'prstGeom');
  const prst = geom?.getAttribute('prst') || '';
  const isOval = prst === 'ellipse' || prst === 'circle';
  const radCSS = isOval ? 'border-radius:50%;' : '';

  /* ── transform ── */
  const trans = [];
  if (fr.rot)   trans.push(`rotate(${fr.rot}deg)`);
  if (fr.flipH) trans.push('scaleX(-1)');
  if (fr.flipV) trans.push('scaleY(-1)');
  const transCSS = trans.length ? `transform:${trans.join(' ')};transform-origin:center center;` : '';

  /* ── text body ── */
  let textHtml = '';
  if (txBody) {
    const bodyPr = xq(txBody,'bodyPr');
    const anchor = bodyPr?.getAttribute('anchor') || 'ctr';
    const jcMap  = { t:'flex-start', ctr:'center', b:'flex-end' };
    const jc     = jcMap[anchor] || 'center';
    const vert   = bodyPr?.getAttribute('vert');
    const isVert = vert === 'vert' || vert === 'vert270' || vert === 'eaVert';
    const lIns   = EMU_PT(parseInt(bodyPr?.getAttribute('lIns') ?? '91440')) * scale;
    const rIns   = EMU_PT(parseInt(bodyPr?.getAttribute('rIns') ?? '91440')) * scale;
    const tIns   = EMU_PT(parseInt(bodyPr?.getAttribute('tIns') ?? '45720')) * scale;
    const bIns   = EMU_PT(parseInt(bodyPr?.getAttribute('bIns') ?? '45720')) * scale;
    const wrap   = bodyPr?.getAttribute('wrap');
    const noWrap = wrap === 'none';

    /* ── shape-level default run props (lstStyle > lvl1pPr > defRPr) ── */
    const lstStyle    = xq(txBody,'lstStyle');
    const lvl1pPr     = lstStyle ? xq(lstStyle,'lvl1pPr') : null;
    const shapeDefRPr = lvl1pPr  ? extractRProp(xq(lvl1pPr,'defRPr')) : {};

    /* ── master default run props by placeholder type ── */
    let masterDef = {};
    if (phType === 'title' || phType === 'ctrTitle') masterDef = masterTxStyles.title || {};
    else if (!phType || phType === 'body' || phType === 'subTitle') masterDef = masterTxStyles.body || {};
    else masterDef = masterTxStyles.other || {};

    const paras = xqa(txBody,'p');
    const parasHtml = paras.map(p =>
      renderPara(p, {}, shapeDefRPr, masterDef, scale)
    ).join('');

    const vertCSS   = isVert ? 'writing-mode:vertical-rl;text-orientation:mixed;' : '';
    const wrapCSS   = noWrap ? 'white-space:nowrap;overflow:visible;' : 'word-break:break-word;';

    textHtml = `<div class="gz-text-layer" style="justify-content:${jc};padding:${tIns}pt ${rIns}pt ${bIns}pt ${lIns}pt;${vertCSS}${wrapCSS}">${parasHtml}</div>`;
  }

  return `<div class="gz-shape" style="left:${fr.x}px;top:${fr.y}px;width:${fr.w}px;height:${fr.h}px;${bgStyle}${bdrCSS}${radCSS}${transCSS}">${textHtml}</div>`;
}

/* ── pic ──────────────────────────────────────────────────────────── */
async function renderPic(pic, relMap, scale) {
  const fr = getXfrm(pic, scale);
  if (!fr) return '';
  const blipFill = xq(pic,'blipFill');
  const blip = blipFill ? xq(blipFill,'blip') : null;
  const rId  = blip?.getAttribute('r:embed') ||
    blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed');
  const src  = await blipSrc(rId, relMap);
  if (!src) return '';

  const trans = [];
  if (fr.rot)   trans.push(`rotate(${fr.rot}deg)`);
  if (fr.flipH) trans.push('scaleX(-1)');
  if (fr.flipV) trans.push('scaleY(-1)');
  const transCSS = trans.length ? `transform:${trans.join(' ')};transform-origin:center center;` : '';

  // Cropping via srcRect
  let cropCSS = 'object-fit:cover;';
  const srcRect = xq(blipFill,'srcRect');
  if (srcRect) {
    const l = parseInt(srcRect.getAttribute('l')||'0')/100000*100;
    const t = parseInt(srcRect.getAttribute('t')||'0')/100000*100;
    const r = parseInt(srcRect.getAttribute('r')||'0')/100000*100;
    const b = parseInt(srcRect.getAttribute('b')||'0')/100000*100;
    if (l||t||r||b) cropCSS = `object-fit:fill;object-position:${l}% ${t}%;`;
  }

  return `<img src="${src}" style="position:absolute;left:${fr.x}px;top:${fr.y}px;width:${fr.w}px;height:${fr.h}px;display:block;${cropCSS}${transCSS}" />`;
}

/* ── grpSp ────────────────────────────────────────────────────────── */
async function renderGrp(grp, relMap, scale) {
  let html = '';
  for (const child of grp.children)
    html += await renderElement(child, relMap, scale);
  return html;
}

/* ── graphicFrame (tables) ────────────────────────────────────────── */
async function renderGraphicFrame(el, relMap, scale) {
  const fr = getXfrm(el, scale);
  if (!fr) return '';
  const tbl = xq(el,'tbl');
  if (!tbl) return '';

  const rows = xqa(tbl,'tr');
  let tHtml = `<table style="width:100%;height:100%;border-collapse:collapse;table-layout:auto;">`;
  for (const tr of rows) {
    tHtml += '<tr>';
    for (const tc of xqa(tr,'tc')) {
      const tcPr   = xq(tc,'tcPr');
      const fStyle = fillCSS(tcPr);
      const txb    = xq(tc,'txBody');
      const lst    = txb ? xq(txb,'lstStyle') : null;
      const lvl1   = lst ? xq(lst,'lvl1pPr') : null;
      const sDef   = lvl1 ? extractRProp(xq(lvl1,'defRPr')) : {};
      const paras  = txb ? xqa(txb,'p').map(p => renderPara(p, {}, sDef, masterTxStyles.body||{}, scale)).join('') : '';
      // border from individual edges
      const bdr = (edge) => {
        const e = xq(tcPr, edge+'Ln') || xq(tcPr, edge);
        if (!e||xq(e,'noFill')) return 'none';
        const w = parseInt(e.getAttribute('w')||'9525');
        const c = resolveColorEl(xq(e,'solidFill')) || '#ccc';
        return `${Math.max(1,EMU_PX(w)*scale)}px solid ${c}`;
      };
      const bdrCSS = tcPr ? `border-top:${bdr('top')};border-right:${bdr('right')};border-bottom:${bdr('bottom')};border-left:${bdr('left')};` : '';
      const vAlign = (() => { const a=tcPr?.getAttribute('anchor'); return a==='b'?'bottom':a==='ctr'?'middle':'top'; })();
      tHtml += `<td style="padding:4pt 6pt;vertical-align:${vAlign};${fStyle}${bdrCSS}">${paras}</td>`;
    }
    tHtml += '</tr>';
  }
  tHtml += '</table>';
  return `<div style="position:absolute;left:${fr.x}px;top:${fr.y}px;width:${fr.w}px;height:${fr.h}px;overflow:hidden;">${tHtml}</div>`;
}

/* ────────────────────────────────────────────────────────────────────
   PARSE THEME + MASTER
──────────────────────────────────────────────────────────────────── */
async function parseTheme() {
  // Try theme1.xml first, fall back to scanning
  const candidates = Object.keys(zip.files).filter(k => k.match(/ppt\/theme\/theme\d*\.xml/));
  const tf = zip.file(candidates[0] || 'ppt/theme/theme1.xml');
  if (!tf) return;
  const doc = parseXml(await tf.async('text'));
  // Colors
  const cs = xq(doc,'clrScheme');
  if (cs) {
    for (const child of cs.children) {
      const name = child.localName;
      const srgb = xq(child,'srgbClr');
      const sys  = xq(child,'sysClr');
      if (srgb) themeColors[name] = '#' + srgb.getAttribute('val');
      else if (sys) themeColors[name] = '#' + (sys.getAttribute('lastClr') || sys.getAttribute('val') || '000000');
    }
  }
  // Fonts
  const fs = xq(doc,'fontScheme');
  if (fs) {
    const maj = xq(fs,'majorFont');
    const min = xq(fs,'minorFont');
    if (maj) themeFonts.major = maj.getAttribute('latin') || 'Calibri';
    if (min) themeFonts.minor = min.getAttribute('latin') || 'Calibri';
  }
}

async function parseMaster() {
  // Find slide master file
  const presRels = await parseRels('ppt/_rels/presentation.xml.rels');
  const masterPath = Object.values(presRels).find(t=>t.includes('slideMaster'));
  if (!masterPath) return;
  const fullPath = masterPath.startsWith('/') ? masterPath.slice(1) : 'ppt/' + masterPath.replace(/^\.\.\//,'');
  const mf = zip.file(fullPath);
  if (!mf) return;
  const doc = parseXml(await mf.async('text'));
  // txStyles
  const txStyles = xq(doc,'txStyles');
  if (txStyles) {
    const extract = (tag) => {
      const lst = xq(txStyles, tag);
      if (!lst) return {};
      const lvl1 = xq(lst,'lvl1pPr');
      return lvl1 ? extractRProp(xq(lvl1,'defRPr')) : {};
    };
    masterTxStyles.title = extract('titleStyle');
    masterTxStyles.body  = extract('bodyStyle');
    masterTxStyles.other = extract('otherStyle');
  }
}

/* ────────────────────────────────────────────────────────────────────
   RENDER FULL SLIDE
──────────────────────────────────────────────────────────────────── */
async function renderSlideHtml(slideFile, scale) {
  const xml     = await zip.file(slideFile).async('text');
  const doc     = parseXml(xml);
  // rels path: ppt/slides/_rels/slide1.xml.rels
  const parts   = slideFile.split('/');
  const relsPath= parts.slice(0,-1).join('/') + '/_rels/' + parts[parts.length-1] + '.rels';
  const relMap  = await parseRels(relsPath);

  const w = Math.round(EMU_PX(slideW_emu) * scale);
  const h = Math.round(EMU_PX(slideH_emu) * scale);

  /* ── background ── */
  let bgHtml = '';
  const bg   = xq(doc,'bg');
  if (bg) {
    const bgPr = xq(bg,'bgPr');
    if (bgPr) {
      const blip = xq(bgPr,'blip');
      if (blip) {
        const rId  = blip.getAttribute('r:embed') ||
          blip.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed');
        const src  = await blipSrc(rId, relMap);
        if (src) bgHtml = `<img src="${src}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;" />`;
      } else {
        const fStyle = fillCSS(bgPr);
        if (fStyle) bgHtml = `<div style="position:absolute;inset:0;${fStyle}z-index:0;"></div>`;
      }
    }
    const bgRef = xq(bg,'bgRef');
    if (bgRef && !bgHtml) {
      const c = resolveColorEl(bgRef);
      if (c) bgHtml = `<div style="position:absolute;inset:0;background:${c};z-index:0;"></div>`;
    }
  }

  /* ── spTree elements ── */
  const spTree = xq(doc,'spTree');
  let shapesHtml = '';
  if (spTree) {
    for (const child of spTree.children)
      shapesHtml += await renderElement(child, relMap, scale);
  }

  return { html: bgHtml + shapesHtml, w, h };
}

/* ═══════════════════════════════════════════════════════════════════
   UI / NAVIGATION
═══════════════════════════════════════════════════════════════════ */
function calcScale() {
  const stage = document.getElementById('stage');
  const aw = stage.clientWidth  - 32;
  const ah = stage.clientHeight - 32;
  const sw = EMU_PX(slideW_emu);
  const sh = EMU_PX(slideH_emu);
  return Math.min(aw / sw, ah / sh, 1.5);
}

async function showSlide(idx) {
  const scale = calcScale();
  let data = renderCache[idx];
  if (!data || Math.abs((data.scale||0) - scale) > 0.01) {
    document.getElementById('loadingMsg').textContent = `Rendering slide ${idx+1}…`;
    document.getElementById('loadingState').style.display = 'flex';
    data = await renderSlideHtml(slideFiles[idx], scale);
    data.scale = scale;
    renderCache[idx] = data;
  }
  document.getElementById('loadingState').style.display = 'none';
  const host = document.getElementById('slideHost');
  host.innerHTML = `<div class="gz-slide" style="width:${data.w}px;height:${data.h}px;background:#fff;">${data.html}</div>`;
  currentIdx = idx;
  updateNav();
}

function updateNav() {
  document.getElementById('slideCounter').textContent = `${currentIdx+1} / ${slideFiles.length}`;
  document.getElementById('btnPrev').disabled = currentIdx <= 0;
  document.getElementById('btnNext').disabled = currentIdx >= slideFiles.length - 1;
  const pct = slideFiles.length > 1 ? (currentIdx / (slideFiles.length-1)) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.querySelectorAll('.thumb-btn').forEach((b,i) => {
    b.classList.toggle('active', i === currentIdx);
    if (i === currentIdx) b.scrollIntoView({block:'nearest',inline:'nearest',behavior:'smooth'});
  });
}

function prevSlide(){ if (currentIdx > 0) showSlide(currentIdx-1); }
function nextSlide(){ if (currentIdx < slideFiles.length-1) showSlide(currentIdx+1); }

function buildThumbs() {
  const bar = document.getElementById('thumbBar');
  bar.innerHTML = '';
  slideFiles.forEach((_,i) => {
    const btn = document.createElement('button');
    btn.className = 'thumb-btn'+(i===0?' active':'');
    btn.textContent = i+1;
    btn.title = 'Slide '+(i+1);
    btn.addEventListener('click', () => showSlide(i));
    bar.appendChild(btn);
  });
}

function toggleFS() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
    document.getElementById('btnFS').textContent = '⛶ Exit Fullscreen';
  } else {
    document.exitFullscreen();
    document.getElementById('btnFS').textContent = '⛶ Fullscreen';
  }
}
document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) document.getElementById('btnFS').textContent = '⛶ Fullscreen';
});

document.addEventListener('keydown', e => {
  if (['ArrowRight','ArrowDown',' ','PageDown'].includes(e.key)) { e.preventDefault(); nextSlide(); }
  else if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)) { e.preventDefault(); prevSlide(); }
  else if (e.key==='f'||e.key==='F') toggleFS();
  else if (e.key==='Home') showSlide(0);
  else if (e.key==='End')  showSlide(slideFiles.length-1);
});

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { renderCache={}; showSlide(currentIdx); }, 260);
});

/* ── IndexedDB load ───────────────────────────────────────────────── */
function loadFromDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('GenzET_PPT', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('slides');
    req.onsuccess = e => {
      const db = e.target.result;
      const tx = db.transaction('slides','readonly');
      const gr = tx.objectStore('slides').get('__gz_ppt_pending__');
      gr.onsuccess = () => { db.close(); resolve(gr.result||null); };
      gr.onerror   = () => { db.close(); reject(gr.error); };
    };
    req.onerror = () => reject(req.error);
  });
}

function showError(msg) {
  document.getElementById('loadingState').style.display = 'none';
  const eb = document.getElementById('errorBox');
  eb.style.display = 'flex';
  document.getElementById('errorMsg').textContent = msg;
}

/* ── Boot ─────────────────────────────────────────────────────────── */
async function init() {
  const name = localStorage.getItem('gz_ppt_pending_name') || 'Presentation';
  const sub  = localStorage.getItem('gz_ppt_pending_sub')  || '';
  document.getElementById('pptTitle').textContent = name;
  document.getElementById('pptSub').textContent   = sub;
  document.title = name + ' — GenZET PPT Viewer';
  document.getElementById('loadingMsg').textContent = 'Reading "'+name+'"…';

  try {
    const buf = await loadFromDB();
    if (!buf) throw new Error('No presentation data found. Please go back and click Present again.');

    document.getElementById('loadingMsg').textContent = 'Parsing PPTX…';
    zip = await JSZip.loadAsync(buf);

    await parseTheme();
    await parseMaster();

    // Read presentation.xml for slide list and sizes
    const presXml = await zip.file('ppt/presentation.xml').async('text');
    const presDoc = parseXml(presXml);
    const sldSz   = xq(presDoc,'sldSz');
    if (sldSz) {
      slideW_emu = parseInt(sldSz.getAttribute('cx')) || 9144000;
      slideH_emu = parseInt(sldSz.getAttribute('cy')) || 5143500;
    }
    const presRels = await parseRels('ppt/_rels/presentation.xml.rels');
    const sldIdLst = xq(presDoc,'sldIdLst');
    slideFiles = xqa(sldIdLst,'sldId').map(el => {
      const rId    = el.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','id')||el.getAttribute('r:id');
      const target = presRels[rId]||'';
      const clean  = target.startsWith('/')?target.slice(1):'ppt/'+target.replace(/^\.\.\//,'');
      return clean;
    }).filter(f => f && zip.file(f));

    if (!slideFiles.length) throw new Error('No slides found in this presentation.');

    buildThumbs();
    await showSlide(0);

    // Flash hint
    const kh = document.getElementById('kbHint');
    kh.classList.add('show');
    setTimeout(() => kh.classList.remove('show'), 3500);

  } catch(err) {
    console.error('[PPT Viewer]', err);
    showError(err.message || 'Failed to load presentation. Please try again.');
  }
}

init();
</script>
